name: Build Standalone OpenClaw Launcher

on:
  push:
    branches: [staging, main]
    paths:
      - "packages/standalone-openclaw-launcher/**"
      - ".github/workflows/launcher-build.yml"
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: win
            arch: x64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable

      # Cache the cargo registry + the per-build `target/` directory so reruns
      # finish in a couple of minutes instead of ~10.
      - name: Cache cargo registry and target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            packages/standalone-openclaw-launcher/src-tauri/target
          key: cargo-${{ runner.os }}-${{ hashFiles('packages/standalone-openclaw-launcher/src-tauri/Cargo.toml') }}
          restore-keys: |
            cargo-${{ runner.os }}-

      - name: Install dependencies
        run: pnpm install

      # ── Frontend typecheck (fast fail before the heavy Rust build) ────────
      - name: TypeCheck launcher frontend
        working-directory: packages/standalone-openclaw-launcher
        run: pnpm typecheck

      - name: Unit tests (wizard state machine)
        working-directory: packages/standalone-openclaw-launcher
        run: pnpm test

      # ── Tauri build (produces MSI + NSIS under src-tauri/target/release) ──
      - name: Build Tauri launcher (${{ matrix.platform }}-${{ matrix.arch }})
        working-directory: packages/standalone-openclaw-launcher
        run: pnpm tauri build

      # ── Upload installers as workflow artifacts ────────────────────────────
      - name: Upload installers
        uses: actions/upload-artifact@v4
        with:
          name: Standalone-OpenClaw-Launcher-${{ matrix.platform }}-${{ matrix.arch }}
          path: |
            packages/standalone-openclaw-launcher/src-tauri/target/release/bundle/msi/*.msi
            packages/standalone-openclaw-launcher/src-tauri/target/release/bundle/nsis/*.exe
          if-no-files-found: error

  # ── GitHub Release (main branch only) ────────────────────────────────────
  release:
    if: github.ref == 'refs/heads/main'
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine next version
        id: version
        run: |
          # 기존 태그 중 최신 버전 조회 (launcher-v* 패턴)
          LATEST_TAG=$(git tag -l 'launcher-v[0-9]*.[0-9]*.[0-9]*' --sort=-v:refname | head -n 1)

          if [ -z "$LATEST_TAG" ]; then
            # 태그가 없으면 package.json 버전 사용
            VERSION=$(node -p "require('./packages/standalone-openclaw-launcher/package.json').version")
          else
            # 최신 태그에서 patch 버전 +1
            VERSION="${LATEST_TAG#launcher-v}"
            MAJOR=$(echo "$VERSION" | cut -d. -f1)
            MINOR=$(echo "$VERSION" | cut -d. -f2)
            PATCH=$(echo "$VERSION" | cut -d. -f3)
            PATCH=$((PATCH + 1))
            VERSION="${MAJOR}.${MINOR}.${PATCH}"
          fi

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "🏷️ Next release version: launcher-v$VERSION"

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: launcher-v${{ steps.version.outputs.version }}
          name: Standalone OpenClaw Launcher v${{ steps.version.outputs.version }}
          files: artifacts/**/*
          generate_release_notes: true
          body: |
            ### Standalone OpenClaw Launcher

            Windows tray launcher for `standalone-openclaw`. Download the `.msi`
            file below and run it — the installer walks through:

            1. Installing a portable Node.js runtime
            2. Installing `standalone-openclaw` + `@anthropic-ai/claude-code`
            3. Running `claude auth login` so Anthropic recognizes you
            4. Collecting your Telegram bot token and workspace folder

            After setup, the gateway runs in the background, auto-starts on
            Windows login, and shows its status via a tray icon (green/yellow/
            red/grey). Double-click the tray icon to open the dashboard.

            See `packages/standalone-openclaw-launcher/README.md` for details.
