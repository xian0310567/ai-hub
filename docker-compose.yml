services:
  hub:
    build: .
    container_name: ai-hub
    ports:
      - "${PORT:-3001}:3001"
    volumes:
      - hub_data:/data
      # 호스트 PC의 claude 인증 마운트 (.env의 CLAUDE_DIR 또는 기본값)
      - ${CLAUDE_DIR:-~/.claude}:/root/.claude
    environment:
      - DATA_DIR=/data
      - WORKSPACES_DIR=/data/workspaces
      - NODE_ENV=production
    restart: unless-stopped

volumes:
  hub_data:
