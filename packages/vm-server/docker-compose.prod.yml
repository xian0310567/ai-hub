services:
  postgres:
    image: postgres:16-alpine
    container_name: aihub-pg-prod
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-aihub}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}
      POSTGRES_DB: ${POSTGRES_DB:-aihub}
    volumes:
      - pg-prod-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-aihub}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    # 외부 노출 안 함 — vm-server만 접근

  vm-server:
    build:
      context: .
      dockerfile: Dockerfile.prod
    container_name: aihub-vm-prod
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "4000:4000"
    volumes:
      - app-data:/app/.data
    env_file: .env.prod
    environment:
      NODE_ENV: production
      PORT: 4000
      HOST: 0.0.0.0
      DATABASE_URL: postgres://${POSTGRES_USER:-aihub}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-aihub}
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:4000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

volumes:
  pg-prod-data:
  app-data:
