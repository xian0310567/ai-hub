services:
  vm-server:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ai-hub-vm-server
    restart: always
    ports:
      - "4000:4000"
    environment:
      NODE_ENV: production
      PORT: 4000
      HOST: 0.0.0.0
      # 허용할 클라이언트 origins (쉼표 구분, 사용자 PC IP들)
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost:3000}
      # 세션 쿠키 서명 키 (반드시 변경)
      COOKIE_SECRET: ${COOKIE_SECRET:?COOKIE_SECRET must be set}
      # Vault 마스터 키: node -e "console.log(require('crypto').randomBytes(32).toString('hex'))"
      VAULT_MASTER_KEY: ${VAULT_MASTER_KEY:?VAULT_MASTER_KEY must be set}
      DATA_DIR: /data
    volumes:
      - vm-data:/data
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:4000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  vm-data:
    driver: local
