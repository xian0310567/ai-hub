app = "ai-hub-vm-server"
primary_region = "nrt"

[build]
  dockerfile = "Dockerfile.prod"

[env]
  NODE_ENV = "production"
  PORT = "4000"
  HOST = "0.0.0.0"
  DATA_DIR = "/data"
  POSTGRES_USER = "aihub"
  POSTGRES_DB = "aihub"

[http_service]
  internal_port = 4000
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

[mounts]
  source = "vm_data"
  destination = "/data"

[checks]
  [checks.health]
    type = "http"
    port = 4000
    path = "/health"
    interval = "30s"
    timeout = "10s"
    grace_period = "30s"

[[vm]]
  size = "shared-cpu-1x"
  memory = "1024mb"
